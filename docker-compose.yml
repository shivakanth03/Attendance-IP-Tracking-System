version: '3.8'

services:
  # ============================================================
  # MySQL Database
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: attendance-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootPass@123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-attendance_db}
      MYSQL_USER: ${MYSQL_USER:-attendance_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-AttendPass@123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    networks:
      - attendance-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ============================================================
  # Spring Boot Backend
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-attendance_db}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-attendance_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-AttendPass@123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      APP_NETWORK_ALLOWED_SUBNET: ${ALLOWED_SUBNET:-192.168.1.0/24}
      SOCKET_SERVER_PORT: 9090
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - attendance-network

  # ============================================================
  # React Frontend (Production build served by Nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attendance-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - attendance-network

# ============================================================
# Volumes
# ============================================================
volumes:
  mysql_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  attendance-network:
    driver: bridge
